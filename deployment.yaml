apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-booking
  template:
    metadata:
      labels:
        app: hotel-booking
    spec:
      containers:
      - name: hotel-booking
        image: praveen22233/hotel-booking:11
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
